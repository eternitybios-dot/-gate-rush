<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>ゲート・ラッシュ</title>
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, minimum-scale=1, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#0b0620">
<style>
  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  html,body{
    width:100%; height:100%; overflow:hidden; background:#0b0620;
    touch-action:none; overscroll-behavior:none; position:fixed;
    font-family:-apple-system, BlinkMacSystemFont, "Segoe UI", "Hiragino Sans", "Yu Gothic", sans-serif;
    -webkit-user-select:none; user-select:none;
  }
  #game{ display:block; position:absolute; top:0; left:0; }

  #hud{
    position:fixed; top:0; left:0; right:0; z-index:5;
    display:flex; justify-content:space-between; gap:4px;
    padding:calc(env(safe-area-inset-top,0px) + 8px) 8px 6px 8px;
    pointer-events:none;
  }
  #hud .stat{
    flex:1; text-align:center; background:rgba(10,6,30,0.55);
    border:2px solid rgba(255,255,255,0.15);
    border-radius:10px; padding:4px 2px 5px;
    box-shadow:0 2px 8px rgba(0,0,0,0.4);
  }
  #hud .label{
    display:block; font-size:9px; letter-spacing:1px; font-weight:700;
    color:#8fe3ff; text-shadow:0 0 6px rgba(80,200,255,0.8);
  }
  #hud .val{
    display:block; font-size:19px; font-weight:900; color:#fff;
    text-shadow:0 1px 3px rgba(0,0,0,0.8); font-variant-numeric: tabular-nums;
  }
  #hud .stat.score .val{ color:#ffe066; }
  #hud .stat.power .val{ color:#ff9f5a; }
  #hud .stat.soldiers .val{ color:#7dffb0; }

  #bossWrap{
    position:fixed; left:10px; right:10px; top:64px; z-index:5;
    display:none; pointer-events:none;
  }
  #bossWrap.show{ display:block; }
  #bossLabel{
    text-align:center; color:#ff7fd8; font-weight:900; font-size:12px;
    letter-spacing:2px; text-shadow:0 0 8px rgba(255,60,180,0.9); margin-bottom:3px;
  }
  #bossBarOuter{
    height:14px; border-radius:8px; background:rgba(0,0,0,0.5);
    border:2px solid rgba(255,255,255,0.25); overflow:hidden;
    box-shadow:0 0 12px rgba(255,0,120,0.5);
  }
  #bossBarInner{
    height:100%; width:100%;
    background:linear-gradient(90deg,#ff2f6e,#ff7fd8,#ff2f6e);
    transition:width 0.15s linear;
  }

  #progressWrap{
    position:fixed; left:14px; right:14px; bottom:14px; z-index:5;
    height:8px; border-radius:6px; background:rgba(0,0,0,0.4);
    border:1px solid rgba(255,255,255,0.2); overflow:hidden; pointer-events:none;
  }
  #progressInner{
    height:100%; width:0%;
    background:linear-gradient(90deg,#42e0ff,#7dffb0);
  }

  #overlay{
    position:fixed; inset:0; z-index:10;
    display:flex; align-items:center; justify-content:center;
    background:radial-gradient(circle at 50% 30%, rgba(40,10,70,0.55), rgba(4,2,14,0.88));
    opacity:1; transition:opacity 0.25s ease;
  }
  #overlay.hidden{ opacity:0; pointer-events:none; }

  #panel{
    width:min(86vw,380px); text-align:center; padding:26px 20px 30px;
    background:linear-gradient(160deg, rgba(35,20,70,0.9), rgba(15,8,35,0.94));
    border:3px solid rgba(255,255,255,0.18); border-radius:22px;
    box-shadow:0 10px 40px rgba(0,0,0,0.6), 0 0 40px rgba(120,60,255,0.35) inset;
  }
  #panelTitle{
    font-size:30px; font-weight:900; letter-spacing:1px; color:#fff;
    text-shadow:0 0 16px rgba(130,90,255,0.9), 0 2px 0 rgba(0,0,0,0.5);
    margin-bottom:10px;
  }
  #panelSub{
    color:#cfe3ff; font-size:14px; line-height:1.6; margin-bottom:22px;
    white-space:pre-line;
  }
  .bigBtn{
    display:inline-block; width:100%; padding:18px 10px; font-size:22px;
    font-weight:900; letter-spacing:2px; color:#0b0620; border:none;
    border-radius:16px; cursor:pointer;
    background:linear-gradient(180deg,#8dffc9,#37d68a);
    box-shadow:0 6px 0 #1c8a58, 0 10px 18px rgba(0,0,0,0.45);
    transform:translateY(0); transition:transform 0.08s, box-shadow 0.08s;
  }
  .bigBtn:active{
    transform:translateY(6px);
    box-shadow:0 0px 0 #1c8a58, 0 4px 8px rgba(0,0,0,0.4);
  }
  #panelHint{ margin-top:16px; font-size:11px; color:#9aa4c7; }
</style>
</head>
<body>

<canvas id="game"></canvas>

<div id="hud">
  <div class="stat stage"><span class="label">STAGE</span><span class="val" id="hudStage">1</span></div>
  <div class="stat soldiers"><span class="label">SOLDIERS</span><span class="val" id="hudSoldiers">10</span></div>
  <div class="stat power"><span class="label">POWER</span><span class="val" id="hudPower">1</span></div>
  <div class="stat score"><span class="label">SCORE</span><span class="val" id="hudScore">0</span></div>
</div>

<div id="bossWrap">
  <div id="bossLabel">BOSS</div>
  <div id="bossBarOuter"><div id="bossBarInner"></div></div>
</div>

<div id="progressWrap"><div id="progressInner"></div></div>

<div id="overlay">
  <div id="panel">
    <div id="panelTitle">GATE RUSH</div>
    <div id="panelSub">部隊を率いて前進せよ。&#10;ゲートを選び、仲間を集め、巨大ボスを撃破しろ!</div>
    <button class="bigBtn" id="mainBtn">START</button>
    <div id="panelHint">ドラッグで左右移動 / ゲートを選んで数を増やせ</div>
  </div>
</div>

<script>
(function(){
"use strict";

const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');

let W = window.innerWidth, H = window.innerHeight, DPR = 1;
function resize(){
  DPR = Math.min(window.devicePixelRatio || 1, 2);
  W = window.innerWidth;
  H = window.innerHeight;
  canvas.width = Math.floor(W * DPR);
  canvas.height = Math.floor(H * DPR);
  canvas.style.width = W + 'px';
  canvas.style.height = H + 'px';
  ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
}
window.addEventListener('resize', resize);
window.addEventListener('orientationchange', resize);
resize();

// ---------- utils ----------
function rand(a, b){ return a + Math.random() * (b - a); }
function randInt(a, b){ return Math.floor(rand(a, b + 1)); }
function clamp(v, a, b){ return Math.max(a, Math.min(b, v)); }
function lerp(a, b, t){ return a + (b - a) * t; }
function pick(arr){ return arr[Math.floor(Math.random() * arr.length)]; }

function roadBounds(){
  const roadWidth = Math.min(W * 0.86, 520);
  const left = (W - roadWidth) / 2;
  return { left, right: left + roadWidth, width: roadWidth, center: left + roadWidth / 2 };
}
function playerY(){ return H * 0.78; }

// ---------- particles & text ----------
class Particle{
  constructor(x, y, color, opt){
    opt = opt || {};
    this.x = x; this.y = y;
    const ang = opt.angle !== undefined ? opt.angle : rand(0, Math.PI * 2);
    const spd = opt.speed !== undefined ? opt.speed : rand(60, 220);
    this.vx = Math.cos(ang) * spd;
    this.vy = Math.sin(ang) * spd - (opt.up || 0);
    this.life = opt.life || rand(0.35, 0.8);
    this.maxLife = this.life;
    this.size = opt.size || rand(2, 5);
    this.color = color;
    this.gravity = opt.gravity !== undefined ? opt.gravity : 260;
  }
  update(dt){
    this.vy += this.gravity * dt;
    this.x += this.vx * dt;
    this.y += this.vy * dt;
    this.life -= dt;
  }
  draw(ctx){
    const t = Math.max(0, this.life / this.maxLife);
    ctx.globalAlpha = t;
    ctx.fillStyle = this.color;
    ctx.beginPath();
    ctx.arc(this.x, this.y, this.size * t, 0, Math.PI * 2);
    ctx.fill();
    ctx.globalAlpha = 1;
  }
}

class FloatingText{
  constructor(x, y, text, color, size){
    this.x = x; this.y = y; this.text = text; this.color = color || '#fff';
    this.size = size || 26;
    this.life = 1.0; this.maxLife = 1.0;
    this.vy = -70;
  }
  update(dt){
    this.y += this.vy * dt;
    this.vy *= 0.98;
    this.life -= dt * 1.1;
  }
  draw(ctx){
    const t = Math.max(0, this.life / this.maxLife);
    ctx.globalAlpha = t;
    ctx.font = `900 ${this.size}px -apple-system, sans-serif`;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.lineWidth = 4;
    ctx.strokeStyle = 'rgba(0,0,0,0.55)';
    ctx.strokeText(this.text, this.x, this.y);
    ctx.fillStyle = this.color;
    ctx.fillText(this.text, this.x, this.y);
    ctx.globalAlpha = 1;
  }
}

// ---------- player ----------
class Player{
  constructor(){
    this.soldiers = 10;
    this.power = 1;
    this.x = roadBounds().center;
    this.targetX = this.x;
    this.shieldTimer = 0;
    this.hitFlash = 0;
  }
  reset(){
    this.soldiers = 10;
    this.power = 1;
    this.x = roadBounds().center;
    this.targetX = this.x;
    this.shieldTimer = 0;
  }
  setTargetFromDrag(x){
    const rb = roadBounds();
    const margin = 34;
    this.targetX = clamp(x, rb.left + margin, rb.right - margin);
  }
  applyDamage(amount){
    if(this.shieldTimer > 0) amount *= 0.3;
    this.soldiers = Math.max(0, this.soldiers - amount);
    this.hitFlash = 0.15;
  }
  update(dt){
    this.x = lerp(this.x, this.targetX, Math.min(1, dt * 9));
    if(this.shieldTimer > 0) this.shieldTimer -= dt;
    if(this.hitFlash > 0) this.hitFlash -= dt;
  }
  visualCount(){ return Math.min(60, Math.max(1, Math.round(this.soldiers))); }
  draw(ctx){
    const y = playerY();
    const count = this.visualCount();
    const cols = Math.max(1, Math.ceil(Math.sqrt(count * 1.4)));
    const rows = Math.ceil(count / cols);
    let spacing = 15;
    const maxWidth = roadBounds().width * 0.85;
    if((cols - 1) * spacing > maxWidth) spacing = maxWidth / Math.max(1, cols - 1);
    spacing = clamp(spacing, 8, 17);

    if(this.shieldTimer > 0){
      ctx.save();
      const pulse = 0.5 + 0.3 * Math.sin(performance.now() / 120);
      ctx.strokeStyle = `rgba(120,210,255,${0.55 + pulse * 0.2})`;
      ctx.lineWidth = 4;
      ctx.beginPath();
      ctx.ellipse(this.x, y - rows * spacing * 0.3, cols * spacing * 0.62 + 20, rows * spacing * 0.7 + 26, 0, 0, Math.PI * 2);
      ctx.stroke();
      ctx.restore();
    }

    let idx = 0;
    for(let r = 0; r < rows; r++){
      const inRow = Math.min(cols, count - r * cols);
      const rowW = (inRow - 1) * spacing;
      for(let c = 0; c < inRow; c++){
        const jx = ((idx * 37) % 7 - 3) * 0.6;
        const jy = ((idx * 53) % 7 - 3) * 0.6;
        const px = this.x - rowW / 2 + c * spacing + jx;
        const py = y - r * spacing * 0.92 + jy;
        const grad = ctx.createRadialGradient(px - 2, py - 2, 1, px, py, 7);
        if(this.hitFlash > 0){
          grad.addColorStop(0, '#ffffff');
          grad.addColorStop(1, '#ff8f8f');
        } else {
          grad.addColorStop(0, '#bff3ff');
          grad.addColorStop(1, '#2f8fe0');
        }
        ctx.fillStyle = grad;
        ctx.beginPath();
        ctx.arc(px, py, 6.6, 0, Math.PI * 2);
        ctx.fill();
        idx++;
      }
    }
  }
}

// ---------- gate ----------
const GOOD_GATES = [
  {op:'+', val:10, label:'+10'},
  {op:'+', val:25, label:'+25'},
  {op:'*', val:2, label:'×2'},
  {op:'*', val:3, label:'×3'},
];
const BAD_GATES = [
  {op:'-', val:10, label:'-10'},
  {op:'-', val:5, label:'-5'},
  {op:'/', val:2, label:'÷2'},
];
function applyOp(soldiers, def){
  switch(def.op){
    case '+': return soldiers + def.val;
    case '-': return Math.max(0, soldiers - def.val);
    case '*': return Math.round(soldiers * def.val);
    case '/': return Math.max(0, Math.floor(soldiers / def.val));
  }
  return soldiers;
}
function colorForGate(def){
  if(def.op === '+' || def.op === '*') return def.op === '*' ? '#37e08a' : '#3fb0ff';
  return def.op === '/' ? '#b565ff' : '#ff5a6e';
}

class Gate{
  constructor(trackPos, badChance){
    this.type = 'gate';
    this.trackPos = trackPos;
    this.resolved = false;
    const leftBad = Math.random() < badChance;
    const rightBad = Math.random() < badChance;
    this.left = leftBad ? pick(BAD_GATES) : pick(GOOD_GATES);
    this.right = rightBad ? pick(BAD_GATES) : pick(GOOD_GATES);
    this.h = 96;
  }
  draw(ctx, screenY){
    const rb = roadBounds();
    const halfW = rb.width / 2;
    const y = screenY - this.h / 2;
    const drawHalf = (x0, w, def) => {
      const col = colorForGate(def);
      ctx.save();
      ctx.fillStyle = col;
      ctx.globalAlpha = 0.28;
      roundRect(ctx, x0, y, w - 4, this.h, 14);
      ctx.fill();
      ctx.globalAlpha = 1;
      ctx.lineWidth = 4;
      ctx.strokeStyle = col;
      roundRect(ctx, x0, y, w - 4, this.h, 14);
      ctx.stroke();
      ctx.font = '900 34px -apple-system, sans-serif';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillStyle = '#fff';
      ctx.shadowColor = col;
      ctx.shadowBlur = 14;
      ctx.fillText(def.label, x0 + (w - 4) / 2, y + this.h / 2);
      ctx.shadowBlur = 0;
      ctx.restore();
    };
    drawHalf(rb.left, halfW, this.left);
    drawHalf(rb.left + halfW, halfW, this.right);
  }
}
function roundRect(ctx, x, y, w, h, r){
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.arcTo(x + w, y, x + w, y + h, r);
  ctx.arcTo(x + w, y + h, x, y + h, r);
  ctx.arcTo(x, y + h, x, y, r);
  ctx.arcTo(x, y, x + w, y, r);
  ctx.closePath();
}

// ---------- enemy group ----------
class EnemyGroup{
  constructor(trackPos, stage, idx){
    this.type = 'enemy';
    this.trackPos = trackPos;
    this.maxHp = 26 + stage * 11 + idx * 4;
    this.hp = this.maxHp;
    this.count = Math.min(28, 6 + Math.floor(stage * 1.3));
    this.attack = 3 + stage * 1.15;
    this.scoreValue = 40 + stage * 10;
    this.defeated = false;
    this.radius = 46;
  }
  draw(ctx, screenY){
    const rb = roadBounds();
    const n = Math.max(3, Math.round(this.count * (this.hp / this.maxHp)));
    const cols = Math.ceil(Math.sqrt(n * 1.3));
    const spacing = 15;
    let idx = 0;
    const rows = Math.ceil(n / cols);
    for(let r = 0; r < rows; r++){
      const inRow = Math.min(cols, n - r * cols);
      const rowW = (inRow - 1) * spacing;
      for(let c = 0; c < inRow; c++){
        const px = rb.center - rowW / 2 + c * spacing;
        const py = screenY - r * spacing * 0.9;
        ctx.fillStyle = '#ff3b4e';
        ctx.beginPath();
        ctx.arc(px, py, 6.2, 0, Math.PI * 2);
        ctx.fill();
        ctx.fillStyle = '#3a0510';
        ctx.beginPath();
        ctx.arc(px - 2, py - 1, 1.3, 0, Math.PI * 2);
        ctx.arc(px + 2, py - 1, 1.3, 0, Math.PI * 2);
        ctx.fill();
        idx++;
      }
    }
    // hp bar
    const bw = 90, bh = 8;
    const bx = rb.center - bw / 2, by = screenY - rows * spacing - 22;
    ctx.fillStyle = 'rgba(0,0,0,0.5)';
    roundRect(ctx, bx, by, bw, bh, 4); ctx.fill();
    ctx.fillStyle = '#ff5a6e';
    roundRect(ctx, bx, by, bw * clamp(this.hp / this.maxHp, 0, 1), bh, 4); ctx.fill();
  }
}

// ---------- boss ----------
class Boss{
  constructor(trackPos, stage){
    this.type = 'boss';
    this.trackPos = trackPos;
    this.maxHp = 220 + stage * 130;
    this.hp = this.maxHp;
    this.attack = 9 + stage * 2.4;
    this.defeated = false;
    this.radius = 90;
    this.t = 0;
  }
  draw(ctx, screenY){
    const rb = roadBounds();
    this.t += 0.016;
    const x = rb.center;
    const wob = Math.sin(this.t * 2) * 6;
    ctx.save();
    ctx.translate(x, screenY + wob);
    // spikes
    ctx.fillStyle = '#3a0a55';
    for(let i = 0; i < 10; i++){
      const a = (i / 10) * Math.PI * 2 + this.t * 0.3;
      ctx.beginPath();
      ctx.moveTo(Math.cos(a) * this.radius * 0.7, Math.sin(a) * this.radius * 0.7);
      ctx.lineTo(Math.cos(a) * this.radius * 1.25, Math.sin(a) * this.radius * 1.25);
      ctx.lineTo(Math.cos(a + 0.12) * this.radius * 0.7, Math.sin(a + 0.12) * this.radius * 0.7);
      ctx.closePath();
      ctx.fill();
    }
    const grad = ctx.createRadialGradient(-20, -20, 10, 0, 0, this.radius);
    grad.addColorStop(0, '#b34dff');
    grad.addColorStop(1, '#4a0d75');
    ctx.fillStyle = grad;
    ctx.beginPath();
    ctx.arc(0, 0, this.radius * 0.78, 0, Math.PI * 2);
    ctx.fill();
    // eyes
    ctx.fillStyle = '#fff';
    ctx.beginPath();
    ctx.ellipse(-22, -6, 12, 15, 0, 0, Math.PI * 2);
    ctx.ellipse(22, -6, 12, 15, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = '#ff2f6e';
    const lookX = clamp((0), -4, 4);
    ctx.beginPath();
    ctx.arc(-22 + lookX, -4, 6, 0, Math.PI * 2);
    ctx.arc(22 + lookX, -4, 6, 0, Math.PI * 2);
    ctx.fill();
    ctx.strokeStyle = '#1a0330';
    ctx.lineWidth = 3;
    ctx.beginPath();
    ctx.arc(0, 24, 26, 0.15 * Math.PI, 0.85 * Math.PI);
    ctx.stroke();
    ctx.restore();
  }
}

// ---------- items ----------
const ITEM_DEFS = {
  ally: {color:'#3fe6a0', label:'仲間 +5'},
  weapon: {color:'#ff9f3f', label:'武器 POWER+1'},
  shield: {color:'#4dc8ff', label:'シールド!'},
  heal: {color:'#ff6fc8', label:'回復 +10'},
};
class Item{
  constructor(trackPos, kind){
    this.type = 'item';
    this.trackPos = trackPos;
    this.kind = kind;
    this.collected = false;
  }
  draw(ctx, screenY){
    const rb = roadBounds();
    const x = rb.center;
    const def = ITEM_DEFS[this.kind];
    const pulse = 1 + Math.sin(performance.now() / 160) * 0.12;
    ctx.save();
    ctx.translate(x, screenY);
    ctx.rotate(performance.now() / 900);
    ctx.fillStyle = def.color;
    ctx.shadowColor = def.color;
    ctx.shadowBlur = 18;
    const s = 22 * pulse;
    ctx.beginPath();
    ctx.moveTo(0, -s); ctx.lineTo(s, 0); ctx.lineTo(0, s); ctx.lineTo(-s, 0);
    ctx.closePath();
    ctx.fill();
    ctx.restore();
    ctx.font = '900 13px -apple-system, sans-serif';
    ctx.textAlign = 'center';
    ctx.fillStyle = '#fff';
    ctx.shadowBlur = 0;
    ctx.fillText(def.label, x, screenY + 38);
  }
}

// ---------- stage generation ----------
function generateStage(stage){
  const events = [];
  let pos = 480;
  const groups = Math.min(2 + Math.floor(stage / 2), 6);
  const badChance = clamp(0.22 + stage * 0.045, 0.22, 0.6);

  for(let i = 0; i < groups; i++){
    events.push(new Gate(pos, badChance));
    pos += 330 + rand(0, 110);
    events.push(new EnemyGroup(pos, stage, i));
    pos += 360 + rand(0, 110);
    if(Math.random() < 0.65){
      const kinds = ['ally', 'weapon', 'shield', 'heal'];
      events.push(new Item(pos, pick(kinds)));
      pos += 280 + rand(0, 90);
    }
  }
  events.push(new Gate(pos, badChance));
  pos += 380;
  const bossPos = pos + 260;
  events.push(new Boss(bossPos, stage));
  return { events, length: bossPos + 420 };
}

// ---------- game ----------
const hudStage = document.getElementById('hudStage');
const hudSoldiers = document.getElementById('hudSoldiers');
const hudPower = document.getElementById('hudPower');
const hudScore = document.getElementById('hudScore');
const bossWrap = document.getElementById('bossWrap');
const bossBarInner = document.getElementById('bossBarInner');
const progressInner = document.getElementById('progressInner');
const overlay = document.getElementById('overlay');
const panelTitle = document.getElementById('panelTitle');
const panelSub = document.getElementById('panelSub');
const panelHint = document.getElementById('panelHint');
const mainBtn = document.getElementById('mainBtn');

class Game{
  constructor(){
    this.state = 'title'; // title | playing | stageclear | gameover
    this.stage = 1;
    this.score = 0;
    this.player = new Player();
    this.particles = [];
    this.texts = [];
    this.traveled = 0;
    this.bgScroll = 0;
    this.scrollSpeed = 150;
    this.blocking = null;
    this.shakeTime = 0;
    this.shakeMag = 0;
    this.stageData = generateStage(1);
    mainBtn.addEventListener('click', () => this.onButton());
  }
  onButton(){
    if(this.state === 'title' || this.state === 'gameover'){
      this.stage = 1;
      this.score = 0;
      this.player.reset();
      this.stageData = generateStage(1);
      this.traveled = 0;
      this.blocking = null;
      this.state = 'playing';
      overlay.classList.add('hidden');
    } else if(this.state === 'stageclear'){
      this.stage++;
      this.stageData = generateStage(this.stage);
      this.traveled = 0;
      this.blocking = null;
      this.state = 'playing';
      overlay.classList.add('hidden');
    }
  }
  triggerShake(mag, dur){
    this.shakeMag = Math.max(this.shakeMag, mag);
    this.shakeTime = Math.max(this.shakeTime, dur);
  }
  spawnBurst(x, y, color, count){
    for(let i = 0; i < count; i++){
      this.particles.push(new Particle(x, y, color, { up: rand(20, 80) }));
    }
  }
  addText(x, y, text, color, size){
    this.texts.push(new FloatingText(x, y, text, color, size));
  }
  showOverlay(title, sub, btnLabel, hint){
    panelTitle.textContent = title;
    panelSub.textContent = sub;
    mainBtn.textContent = btnLabel;
    panelHint.textContent = hint || '';
    overlay.classList.remove('hidden');
  }
  gameOver(){
    this.state = 'gameover';
    bossWrap.classList.remove('show');
    this.showOverlay('GAME OVER', `STAGE ${this.stage} で全滅した...\nSCORE: ${Math.floor(this.score)}`, 'RETRY', 'もう一度最初から挑戦しよう');
  }
  stageClear(){
    this.state = 'stageclear';
    bossWrap.classList.remove('show');
    this.showOverlay('STAGE CLEAR!', `STAGE ${this.stage} 突破!\nSOLDIERS ${Math.round(this.player.soldiers)} / POWER ${this.player.power}`, 'NEXT STAGE');
  }
  update(dt){
    this.player.update(dt);
    this.bgScroll += dt * 90;

    if(this.shakeTime > 0){
      this.shakeTime -= dt;
      if(this.shakeTime <= 0) this.shakeMag = 0;
    }

    for(let i = this.particles.length - 1; i >= 0; i--){
      const p = this.particles[i];
      p.update(dt);
      if(p.life <= 0) this.particles.splice(i, 1);
    }
    for(let i = this.texts.length - 1; i >= 0; i--){
      const t = this.texts[i];
      t.update(dt);
      if(t.life <= 0) this.texts.splice(i, 1);
    }

    if(this.state !== 'playing') return;

    const py = playerY();
    const events = this.stageData.events;

    if(!this.blocking){
      this.traveled += this.scrollSpeed * dt;
    }

    let bossActive = false;

    for(let i = 0; i < events.length; i++){
      const ev = events[i];
      if(ev.done) continue;
      const remaining = ev.trackPos - this.traveled;
      const screenY = py - remaining;
      ev._screenY = screenY;

      if(ev.type === 'gate'){
        if(!ev.resolved && screenY >= py - 6){
          ev.resolved = true;
          ev.done = true;
          const half = this.player.x < roadBounds().center ? ev.left : ev.right;
          const before = this.player.soldiers;
          this.player.soldiers = applyOp(this.player.soldiers, half);
          const diff = this.player.soldiers - before;
          const good = diff >= 0;
          const col = colorForGate(half);
          this.addText(this.player.x, py - 60, half.label, col, 34);
          this.spawnBurst(this.player.x, py - 40, col, good ? 22 : 16);
          this.triggerShake(good ? 6 : 10, good ? 0.18 : 0.28);
          if(this.player.soldiers <= 0){
            this.gameOver();
            return;
          }
        }
      } else if(ev.type === 'item'){
        if(!ev.collected && screenY >= py - 10){
          ev.collected = true;
          ev.done = true;
          const def = ITEM_DEFS[ev.kind];
          if(ev.kind === 'ally') this.player.soldiers += 5;
          else if(ev.kind === 'weapon') this.player.power += 1;
          else if(ev.kind === 'shield') this.player.shieldTimer = 6;
          else if(ev.kind === 'heal') this.player.soldiers += 10;
          this.addText(this.player.x, py - 70, def.label, def.color, 22);
          this.spawnBurst(this.player.x, py - 40, def.color, 18);
        }
      } else if(ev.type === 'enemy'){
        if(ev.defeated){ continue; }
        if(screenY >= py - ev.radius * 0.5){
          this.blocking = ev;
          // combat
          const dmgToEnemy = this.player.soldiers * this.player.power * dt * 1.0;
          ev.hp -= dmgToEnemy;
          const frac = clamp(ev.hp / ev.maxHp, 0, 1);
          const dmgToPlayer = ev.attack * dt * (0.35 + 0.65 * frac);
          this.player.applyDamage(dmgToPlayer);
          if(Math.random() < dt * 12){
            this.spawnBurst(roadBounds().center + rand(-20,20), screenY, '#ffcf4d', 3);
          }
          if(ev.hp <= 0){
            ev.defeated = true;
            ev.done = true;
            this.blocking = null;
            this.score += ev.scoreValue;
            this.addText(roadBounds().center, screenY - 20, `+${ev.scoreValue}`, '#ffe066', 26);
            this.spawnBurst(roadBounds().center, screenY, '#ff5a6e', 26);
            this.triggerShake(8, 0.2);
          }
          if(this.player.soldiers <= 0){
            this.gameOver();
            return;
          }
        }
      } else if(ev.type === 'boss'){
        if(ev.defeated){ continue; }
        const stopScreenY = H * 0.32;
        if(screenY >= stopScreenY - ev.radius){
          bossActive = true;
          this.blocking = ev;
          ev._screenY = stopScreenY;
          const dmgToBoss = this.player.soldiers * this.player.power * dt * 1.0;
          ev.hp -= dmgToBoss;
          const frac = clamp(ev.hp / ev.maxHp, 0, 1);
          const dmgToPlayer = ev.attack * dt * (0.4 + 0.6 * frac);
          this.player.applyDamage(dmgToPlayer);
          if(Math.random() < dt * 14){
            this.spawnBurst(roadBounds().center + rand(-40,40), stopScreenY + rand(-20,20), '#c86bff', 3);
          }
          if(ev.hp <= 0){
            ev.defeated = true;
            ev.done = true;
            this.blocking = null;
            this.score += 500 + this.stage * 100;
            this.addText(roadBounds().center, stopScreenY - 40, 'BOSS DOWN!', '#ffe066', 30);
            this.spawnBurst(roadBounds().center, stopScreenY, '#c86bff', 50);
            this.spawnBurst(roadBounds().center, stopScreenY, '#ffe066', 30);
            this.triggerShake(16, 0.4);
            this.stageClear();
            return;
          }
          if(this.player.soldiers <= 0){
            this.gameOver();
            return;
          }
        }
      }
    }

    bossWrap.classList.toggle('show', bossActive);
    if(bossActive){
      const boss = events.find(e => e.type === 'boss' && !e.done);
      if(boss) bossBarInner.style.width = clamp(boss.hp / boss.maxHp, 0, 1) * 100 + '%';
    }

    const progress = clamp(this.traveled / this.stageData.length, 0, 1);
    progressInner.style.width = (progress * 100) + '%';

    hudStage.textContent = this.stage;
    hudSoldiers.textContent = Math.round(this.player.soldiers);
    hudPower.textContent = this.player.power;
    hudScore.textContent = Math.floor(this.score);
  }

  drawBackground(){
    const g = ctx.createLinearGradient(0, 0, 0, H);
    g.addColorStop(0, '#241058');
    g.addColorStop(0.55, '#170a3d');
    g.addColorStop(1, '#0b0620');
    ctx.fillStyle = g;
    ctx.fillRect(0, 0, W, H);

    // distant glow
    ctx.save();
    ctx.globalAlpha = 0.5;
    const rg = ctx.createRadialGradient(W/2, H*0.18, 10, W/2, H*0.18, W*0.7);
    rg.addColorStop(0, 'rgba(160,90,255,0.35)');
    rg.addColorStop(1, 'rgba(160,90,255,0)');
    ctx.fillStyle = rg;
    ctx.fillRect(0,0,W,H);
    ctx.restore();

    const rb = roadBounds();
    ctx.fillStyle = 'rgba(255,255,255,0.05)';
    ctx.fillRect(rb.left, 0, rb.width, H);
    ctx.strokeStyle = 'rgba(255,255,255,0.18)';
    ctx.lineWidth = 3;
    ctx.beginPath(); ctx.moveTo(rb.left, 0); ctx.lineTo(rb.left, H); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(rb.right, 0); ctx.lineTo(rb.right, H); ctx.stroke();

    // scrolling dash lines
    ctx.setLineDash([26, 24]);
    ctx.lineDashOffset = -this.bgScroll;
    ctx.strokeStyle = 'rgba(255,255,255,0.14)';
    ctx.lineWidth = 3;
    ctx.beginPath(); ctx.moveTo(rb.center, 0); ctx.lineTo(rb.center, H); ctx.stroke();
    ctx.setLineDash([]);
  }

  render(){
    ctx.clearRect(0, 0, W, H);
    ctx.save();
    if(this.shakeTime > 0){
      ctx.translate(rand(-this.shakeMag, this.shakeMag), rand(-this.shakeMag, this.shakeMag));
    }
    this.drawBackground();

    if(this.state === 'playing' || this.state === 'stageclear'){
      const py = playerY();
      const drawables = this.stageData.events.filter(ev => !ev.done);
      drawables.sort((a, b) => a.trackPos - b.trackPos);
      for(const ev of drawables){
        const y = ev._screenY !== undefined ? ev._screenY : py - (ev.trackPos - this.traveled);
        if(y < -140 || y > H + 140) continue;
        ev.draw(ctx, y);
      }
      this.player.draw(ctx);
    }

    for(const p of this.particles) p.draw(ctx);
    for(const t of this.texts) t.draw(ctx);

    ctx.restore();
  }
}

const game = new Game();
game.showOverlay('GATE RUSH', '部隊を率いて前進せよ。\nゲートを選び、仲間を集め、巨大ボスを撃破しろ!', 'START', 'ドラッグで左右移動 / ゲートを選んで数を増やせ');

// ---------- input ----------
let dragging = false, dragStartX = 0, dragStartPlayerX = 0;
function onDown(x){
  dragging = true;
  dragStartX = x;
  dragStartPlayerX = game.player.targetX;
}
function onMove(x){
  if(!dragging) return;
  game.player.setTargetFromDrag(dragStartPlayerX + (x - dragStartX));
}
function onUp(){ dragging = false; }

canvas.addEventListener('touchstart', e => { e.preventDefault(); onDown(e.touches[0].clientX); }, { passive:false });
canvas.addEventListener('touchmove', e => { e.preventDefault(); onMove(e.touches[0].clientX); }, { passive:false });
canvas.addEventListener('touchend', e => { e.preventDefault(); onUp(); }, { passive:false });
canvas.addEventListener('touchcancel', e => { e.preventDefault(); onUp(); }, { passive:false });

canvas.addEventListener('mousedown', e => onDown(e.clientX));
window.addEventListener('mousemove', e => onMove(e.clientX));
window.addEventListener('mouseup', onUp);

document.body.addEventListener('touchmove', function(e){ e.preventDefault(); }, { passive:false });

// ---------- loop ----------
let last = performance.now();
function loop(ts){
  let dt = (ts - last) / 1000;
  if(dt > 0.05) dt = 0.05;
  last = ts;
  game.update(dt);
  game.render();
  requestAnimationFrame(loop);
}
requestAnimationFrame(loop);

})();
</script>
